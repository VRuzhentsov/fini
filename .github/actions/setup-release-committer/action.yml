name: Setup Release Committer
description: Create a GitHub App token and configure git for release automation.

inputs:
  app-id:
    description: GitHub App ID used for release automation.
    required: true
  private-key:
    description: GitHub App private key used for release automation.
    required: true

outputs:
  token:
    description: GitHub App installation token.
    value: ${{ steps.app-token.outputs.token }}
  app-slug:
    description: GitHub App slug.
    value: ${{ steps.app-token.outputs.app-slug }}

runs:
  using: composite
  steps:
    - name: Create app token
      id: app-token
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}
        owner: ${{ github.repository_owner }}

    - name: Configure git identity
      shell: bash
      run: |
        set -euo pipefail
        slug="${{ steps.app-token.outputs.app-slug }}"
        git config --global user.name "${slug}[bot]"
        git config --global user.email "${slug}[bot]@users.noreply.github.com"

    - name: Clear checkout auth
      shell: bash
      run: |
        set -euo pipefail
        git config --local --unset-all http.https://github.com/.extraheader || true

    - name: Configure authenticated origin
      shell: bash
      run: |
        set -euo pipefail
        git remote set-url origin "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}"

name: Release From Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  validate-tag:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.tag_meta.outputs.is_prerelease }}
      tag_commit: ${{ steps.tag_commit.outputs.tag_commit }}
      tag_name: ${{ steps.tag_meta.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format
        id: tag_meta
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            echo "Tag must match vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-rc.N" >&2
            exit 1
          fi
          is_prerelease="false"
          if [[ "$tag" == *"-rc."* ]]; then
            is_prerelease="true"
          fi
          echo "tag_name=$tag" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

      - name: Verify tag actor has maintain/admin access
        uses: actions/github-script@v7
        with:
          script: |
            const actor = context.actor;
            const { owner, repo } = context.repo;
            const result = await github.rest.repos.getCollaboratorPermissionLevel({
              owner,
              repo,
              username: actor,
            });
            const allowed = new Set(["maintain", "admin"]);
            const permission = result.data.permission;
            core.info(`Tag actor ${actor} has permission: ${permission}`);
            if (!allowed.has(permission)) {
              core.setFailed(`Tag actor ${actor} must have maintain/admin permission.`);
            }

      - name: Resolve tag commit and compare with origin/main
        id: tag_commit
        run: |
          set -euo pipefail
          git fetch origin main --tags --force
          tag_commit="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          main_commit="$(git rev-parse origin/main)"
          echo "tag_commit=$tag_commit" >> "$GITHUB_OUTPUT"
          if [ "$tag_commit" != "$main_commit" ]; then
            echo "Tag must point to current origin/main HEAD" >&2
            echo "tag_commit=$tag_commit" >&2
            echo "main_commit=$main_commit" >&2
            exit 1
          fi

      - name: Verify signed annotated tag
        env:
          RELEASE_TAG_GPG_PUBLIC_KEY: ${{ secrets.RELEASE_TAG_GPG_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          object_type="$(git cat-file -t "refs/tags/$GITHUB_REF_NAME")"
          if [ "$object_type" != "tag" ]; then
            echo "Release tags must be annotated." >&2
            exit 1
          fi
          if [ -z "${RELEASE_TAG_GPG_PUBLIC_KEY:-}" ]; then
            echo "Missing required secret: RELEASE_TAG_GPG_PUBLIC_KEY" >&2
            exit 1
          fi
          printf '%s' "$RELEASE_TAG_GPG_PUBLIC_KEY" > release-tag-key.asc
          gpg --batch --import release-tag-key.asc
          git tag -v "$GITHUB_REF_NAME"

      - name: Ensure release prep check exists for same commit in last 24h
        uses: actions/github-script@v7
        env:
          TAG_COMMIT: ${{ steps.tag_commit.outputs.tag_commit }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const tagCommit = process.env.TAG_COMMIT;
            const cutoffMs = Date.now() - (24 * 60 * 60 * 1000);
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id: 'release-dry-run.yml',
              per_page: 100,
            });

            const match = runs.find((run) => {
              if (run.head_sha !== tagCommit) return false;
              if (run.event !== 'workflow_dispatch') return false;
              if (run.conclusion !== 'success') return false;
              const updatedAt = new Date(run.updated_at).getTime();
              return updatedAt >= cutoffMs;
            });

            if (!match) {
              core.setFailed(`No successful release prep check for commit ${tagCommit} within last 24h.`);
              return;
            }

            core.info(`Release prep check passed via run #${match.run_number} (${match.html_url})`);

  signing-readiness:
    name: Signing Readiness
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Validate required signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          required=(
            ANDROID_KEYSTORE_BASE64
            ANDROID_KEYSTORE_PASSWORD
            ANDROID_KEY_ALIAS
            ANDROID_KEY_PASSWORD
          )
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: ${key}" >&2
              exit 1
            fi
          done

      - name: Validate cosign keyless signing
        run: |
          set -euo pipefail
          printf 'release-sign-check' > probe.txt
          cosign sign-blob --yes \
            --output-signature probe.txt.sig \
            --output-certificate probe.txt.pem \
            --bundle probe.txt.bundle \
            probe.txt
          test -s probe.txt.sig
          test -s probe.txt.pem
          test -s probe.txt.bundle

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: signing-readiness
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Sync project version from tag
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          npm version "$version" --no-git-tag-version --allow-same-version
          sed -i -E '/^\[package\]/,/^\[/{s/^version = ".*"/version = "'"$version"'"/}' src-tauri/Cargo.toml
          sed -i -E '/^name = "fini"$/{n;s/^version = ".*"/version = "'"$version"'"/;}' src-tauri/Cargo.lock
          sed -i -E '0,/"version": "[^"]+"/{s//"version": "'"$version"'"/}' src-tauri/tauri.conf.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          shared-key: release-rust

      - name: Install npm dependencies
        run: npm ci

      - name: Run backend tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Run backend compile checks
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Run frontend build
        run: npm run build

  build-linux:
    name: Build Linux Artifact
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Sync project version from tag
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          npm version "$version" --no-git-tag-version --allow-same-version
          sed -i -E '/^\[package\]/,/^\[/{s/^version = ".*"/version = "'"$version"'"/}' src-tauri/Cargo.toml
          sed -i -E '/^name = "fini"$/{n;s/^version = ".*"/version = "'"$version"'"/;}' src-tauri/Cargo.lock
          sed -i -E '0,/"version": "[^"]+"/{s//"version": "'"$version"'"/}' src-tauri/tauri.conf.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          shared-key: release-rust

      - name: Install npm dependencies
        run: npm ci

      - name: Build Linux bundles
        run: npm run tauri build

      - name: Archive Linux bundle
        run: |
          set -euo pipefail
          archive_name="fini-${GITHUB_REF_NAME}-linux-bundle.tar.gz"
          tar -czf "$archive_name" -C src-tauri/target/release bundle

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: fini-${{ github.ref_name }}-linux-bundle.tar.gz
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Build Windows Artifact
    runs-on: windows-latest
    needs: quality-gates
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Sync project version from tag
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          npm version "$version" --no-git-tag-version --allow-same-version
          sed -i -E '/^\[package\]/,/^\[/{s/^version = ".*"/version = "'"$version"'"/}' src-tauri/Cargo.toml
          sed -i -E '/^name = "fini"$/{n;s/^version = ".*"/version = "'"$version"'"/;}' src-tauri/Cargo.lock
          sed -i -E '0,/"version": "[^"]+"/{s//"version": "'"$version"'"/}' src-tauri/tauri.conf.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          shared-key: release-rust

      - name: Install npm dependencies
        run: npm ci

      - name: Build Windows bundles
        run: npm run tauri build

      - name: Archive Windows bundle
        shell: pwsh
        run: |
          $archiveName = "fini-${{ github.ref_name }}-windows-bundle.zip"
          Compress-Archive -Path "src-tauri/target/release/bundle/*" -DestinationPath $archiveName -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: fini-${{ github.ref_name }}-windows-bundle.zip
          if-no-files-found: error
          retention-days: 14

  build-android:
    name: Build Android Artifact
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore Android project cache
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/gen/android/.gradle
          key: android-project-${{ runner.os }}-${{ hashFiles('src-tauri/gen/android/gradle.properties', 'src-tauri/gen/android/settings.gradle', 'src-tauri/gen/android/build.gradle.kts', 'src-tauri/gen/android/app/build.gradle.kts', 'src-tauri/gen/android/gradle/wrapper/gradle-wrapper.properties', 'src-tauri/Cargo.lock', 'package-lock.json') }}
          restore-keys: |
            android-project-${{ runner.os }}-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Sync project version from tag
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          npm version "$version" --no-git-tag-version --allow-same-version
          sed -i -E '/^\[package\]/,/^\[/{s/^version = ".*"/version = "'"$version"'"/}' src-tauri/Cargo.toml
          sed -i -E '/^name = "fini"$/{n;s/^version = ".*"/version = "'"$version"'"/;}' src-tauri/Cargo.lock
          sed -i -E '0,/"version": "[^"]+"/{s//"version": "'"$version"'"/}' src-tauri/tauri.conf.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: rustup target add aarch64-linux-android

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          shared-key: release-rust

      - name: Install npm dependencies
        run: npm ci

      - name: Build Android APK (arm64)
        run: npm run tauri android build -- --ci --apk --target aarch64

      - name: Prepare Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > /tmp/release.keystore

      - name: Sign Android APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          unsigned_apk="$(find src-tauri/gen/android/app/build/outputs/apk -name '*-unsigned.apk' | head -n 1)"
          if [ -z "$unsigned_apk" ]; then
            echo "Unsigned APK not found" >&2
            exit 1
          fi
          apksigner_path="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort | tail -n 1)"
          if [ -z "$apksigner_path" ]; then
            echo "apksigner not found in Android build-tools" >&2
            exit 1
          fi
          signed_apk="fini-${GITHUB_REF_NAME}-android.apk"
          "$apksigner_path" sign \
            --ks /tmp/release.keystore \
            --ks-pass "pass:${ANDROID_KEYSTORE_PASSWORD}" \
            --ks-key-alias "${ANDROID_KEY_ALIAS}" \
            --key-pass "pass:${ANDROID_KEY_PASSWORD}" \
            --out "$signed_apk" \
            "$unsigned_apk"
          "$apksigner_path" verify "$signed_apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: fini-${{ github.ref_name }}-android.apk
          if-no-files-found: error
          retention-days: 14

  build-docker-image:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - quality-gates
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Sync project version from tag
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          npm version "$version" --no-git-tag-version --allow-same-version
          sed -i -E '/^\[package\]/,/^\[/{s/^version = ".*"/version = "'"$version"'"/}' src-tauri/Cargo.toml
          sed -i -E '/^name = "fini"$/{n;s/^version = ".*"/version = "'"$version"'"/;}' src-tauri/Cargo.lock
          sed -i -E '0,/"version": "[^"]+"/{s//"version": "'"$version"'"/}' src-tauri/tauri.conf.json

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve image name
        id: image
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            return `ghcr.io/${context.repo.owner.toLowerCase()}/fini`;

      - name: Generate docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.result }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest,enable=${{ needs.validate-tag.outputs.is_prerelease == 'false' }}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=fini-image
          cache-to: type=gha,mode=max,scope=fini-image
          provenance: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Sign Docker image digest
        run: |
          set -euo pipefail
          cosign sign --yes "${{ steps.image.outputs.result }}@${{ steps.docker_build.outputs.digest }}"

      - name: Attest Docker image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.image.outputs.result }}
          subject-digest: ${{ steps.docker_build.outputs.digest }}
          push-to-registry: true

  publish-stable:
    name: Publish Stable Release
    if: needs.validate-tag.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    environment: release
    needs:
      - validate-tag
      - build-linux
      - build-windows
      - build-android
      - build-docker-image
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        run: syft dir:release-assets -o spdx-json=release-assets/fini-${{ github.ref_name }}.sbom.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Sign release assets
        run: |
          set -euo pipefail
          for file in release-assets/*; do
            if [ -f "$file" ] && [[ "$file" != *.sig ]] && [[ "$file" != *.pem ]] && [[ "$file" != *.bundle ]]; then
              cosign sign-blob --yes \
                --output-signature "${file}.sig" \
                --output-certificate "${file}.pem" \
                --bundle "${file}.bundle" \
                "$file"
            fi
          done

      - name: Generate SHA256 checksums
        run: |
          set -euo pipefail
          find release-assets -maxdepth 1 -type f ! -name 'SHA256SUMS.txt' -print0 | sort -z | xargs -0 sha256sum > release-assets/SHA256SUMS.txt

      - name: Create build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "release-assets/*"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --verify-tag \
            --generate-notes

  publish-prerelease:
    name: Publish Prerelease
    if: needs.validate-tag.outputs.is_prerelease == 'true'
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - build-linux
      - build-windows
      - build-android
      - build-docker-image
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        run: syft dir:release-assets -o spdx-json=release-assets/fini-${{ github.ref_name }}.sbom.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Sign release assets
        run: |
          set -euo pipefail
          for file in release-assets/*; do
            if [ -f "$file" ] && [[ "$file" != *.sig ]] && [[ "$file" != *.pem ]] && [[ "$file" != *.bundle ]]; then
              cosign sign-blob --yes \
                --output-signature "${file}.sig" \
                --output-certificate "${file}.pem" \
                --bundle "${file}.bundle" \
                "$file"
            fi
          done

      - name: Generate SHA256 checksums
        run: |
          set -euo pipefail
          find release-assets -maxdepth 1 -type f ! -name 'SHA256SUMS.txt' -print0 | sort -z | xargs -0 sha256sum > release-assets/SHA256SUMS.txt

      - name: Create build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "release-assets/*"

      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --verify-tag \
            --prerelease \
            --generate-notes

name: Release From Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  actions: read
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"

jobs:
  security-scan:
    uses: ./.github/workflows/security.yml
    secrets: inherit

  validate-tag:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.tag_meta.outputs.is_prerelease }}
      tag_commit: ${{ steps.tag_commit.outputs.tag_commit }}
      tag_name: ${{ steps.tag_meta.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate tag format
        id: tag_meta
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            echo "Tag must match vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-rc.N" >&2
            exit 1
          fi
          is_prerelease="false"
          if [[ "$tag" == *"-rc."* ]]; then
            is_prerelease="true"
          fi
          echo "tag_name=$tag" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

      - name: Verify tag actor has maintain/admin access
        uses: actions/github-script@v8
        with:
          script: |
            const actor = context.actor;
            const { owner, repo } = context.repo;
            const result = await github.rest.repos.getCollaboratorPermissionLevel({
              owner,
              repo,
              username: actor,
            });
            const allowed = new Set(["maintain", "admin"]);
            const permission = result.data.permission;
            core.info(`Tag actor ${actor} has permission: ${permission}`);
            if (!allowed.has(permission)) {
              core.setFailed(`Tag actor ${actor} must have maintain/admin permission.`);
            }

      - name: Resolve tag commit and compare with origin/main
        id: tag_commit
        run: |
          set -euo pipefail
          git fetch origin main --tags --force
          tag_commit="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          main_commit="$(git rev-parse origin/main)"
          echo "tag_commit=$tag_commit" >> "$GITHUB_OUTPUT"
          if [ "$tag_commit" != "$main_commit" ]; then
            echo "Tag must point to current origin/main HEAD" >&2
            echo "tag_commit=$tag_commit" >&2
            echo "main_commit=$main_commit" >&2
            exit 1
          fi

      - name: Verify signed annotated tag
        env:
          RELEASE_TAG_GPG_PUBLIC_KEY: ${{ secrets.RELEASE_TAG_GPG_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          object_type="$(git cat-file -t "refs/tags/$GITHUB_REF_NAME")"
          if [ "$object_type" != "tag" ]; then
            echo "Release tags must be annotated." >&2
            exit 1
          fi
          if [ -z "${RELEASE_TAG_GPG_PUBLIC_KEY:-}" ]; then
            echo "Missing required secret: RELEASE_TAG_GPG_PUBLIC_KEY" >&2
            exit 1
          fi
          printf '%s' "$RELEASE_TAG_GPG_PUBLIC_KEY" > release-tag-key.asc
          gpg --batch --import release-tag-key.asc
          git tag -v "$GITHUB_REF_NAME"

  signing-readiness:
    name: Signing Readiness
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Validate required signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          FINI_TAURI_UPDATER_PUBKEY: ${{ secrets.FINI_TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          required=(
            ANDROID_KEYSTORE_BASE64
            ANDROID_KEYSTORE_PASSWORD
            ANDROID_KEY_ALIAS
            ANDROID_KEY_PASSWORD
            FINI_TAURI_UPDATER_PUBKEY
            TAURI_SIGNING_PRIVATE_KEY
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          )
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: ${key}" >&2
              exit 1
            fi
          done

      - name: Validate cosign keyless signing
        run: |
          set -euo pipefail
          printf 'release-sign-check' > probe.txt
          cosign sign-blob --yes \
            --output-signature probe.txt.sig \
            --output-certificate probe.txt.pem \
            --bundle probe.txt.bundle \
            probe.txt
          test -s probe.txt.sig
          test -s probe.txt.pem
          test -s probe.txt.bundle

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: [signing-readiness, security-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Sync project version from tag
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          npm version "$version" --no-git-tag-version --allow-same-version
          sed -i -E '/^\[package\]/,/^\[/{s/^version = ".*"/version = "'"$version"'"/}' src-tauri/Cargo.toml
          sed -i -E '/^name = "fini"$/,/^version = /{s/^version = ".*"/version = "'"$version"'"/}' src-tauri/Cargo.lock
          sed -i -E '0,/"version": "[^"]+"/{s//"version": "'"$version"'"/}' src-tauri/tauri.conf.json
          grep -q "\"version\": \"$version\"" package.json
          grep -q "^version = \"$version\"" src-tauri/Cargo.toml
          grep -q "^version = \"$version\"" src-tauri/Cargo.lock
          grep -q "\"version\": \"$version\"" src-tauri/tauri.conf.json

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve E2E image cache settings
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "FINI_BE_CACHE_IMAGE_PREFIX=ghcr.io/${owner}/fini" >> "$GITHUB_ENV"
          echo "FINI_BE_CACHE_PUSH=1" >> "$GITHUB_ENV"
          echo "FINI_E2E_CACHE_IMAGE_PREFIX=ghcr.io/${owner}/fini" >> "$GITHUB_ENV"
          echo "FINI_E2E_CACHE_PUSH=1" >> "$GITHUB_ENV"
          echo "CONTAINER=docker" >> "$GITHUB_ENV"
          echo "FINI_E2E_CI_RUN_ID=release-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"

      - name: Install npm dependencies
        run: npm ci

      - name: Compile backend tests
        run: make pr-gate-be-compile

      - name: Run backend tests
        run: make pr-gate-be-unit

      - name: Run frontend build
        run: npm run build

      - name: Build runtime container
        run: |
          docker buildx build \
            --target runtime \
            --load \
            --cache-from type=gha,scope=fini-runtime \
            --cache-to type=gha,mode=max,scope=fini-runtime \
            -t fini-runtime-ci \
            .

      - name: Run runtime smoke check
        run: docker run --rm fini-runtime-ci --help

      - name: Build dev-runner image
        run: make pr-gate-e2e-build-dev-runner

      - name: Run desktop e2e flow
        run: make pr-gate-e2e-run

      - name: Print E2E artifacts on failure
        if: failure()
        run: make pr-gate-e2e-artifacts

      - name: Cleanup E2E containers
        if: always()
        run: make pr-gate-e2e-cleanup

  build-linux:
    name: Build Linux Artifact (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
          - arch: arm64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    needs: quality-gates
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            xdg-utils \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Sync project version from tag
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          npm version "$version" --no-git-tag-version --allow-same-version
          sed -i -E '/^\[package\]/,/^\[/{s/^version = ".*"/version = "'"$version"'"/}' src-tauri/Cargo.toml
          sed -i -E '/^name = "fini"$/,/^version = /{s/^version = ".*"/version = "'"$version"'"/}' src-tauri/Cargo.lock
          sed -i -E '0,/"version": "[^"]+"/{s//"version": "'"$version"'"/}' src-tauri/tauri.conf.json
          grep -q "\"version\": \"$version\"" package.json
          grep -q "^version = \"$version\"" src-tauri/Cargo.toml
          grep -q "^version = \"$version\"" src-tauri/Cargo.lock
          grep -q "\"version\": \"$version\"" src-tauri/tauri.conf.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          shared-key: release-rust-${{ matrix.rust_target }}

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare AppImage GTK bundler
        run: scripts/prepare-tauri-linuxdeploy-gtk-plugin.sh

      - name: Build Linux bundles
        env:
          FINI_TAURI_UPDATER_PUBKEY: ${{ secrets.FINI_TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --features ui-plane,desktop-updater --target ${{ matrix.rust_target }} --bundles appimage,deb,rpm -- --bin fini-app

      - name: Verify AppImage host runtime boundary
        run: |
          set -euo pipefail
          appimage="$(find "src-tauri/target/${{ matrix.rust_target }}/release/bundle/appimage" -type f -name '*.AppImage' -print -quit)"
          if [ -z "$appimage" ]; then
            echo "Expected AppImage was not produced" >&2
            exit 1
          fi
          scripts/verify-appimage-host-runtime.sh "$appimage"

      - name: Verify Linux desktop binary
        run: |
          set -euo pipefail
          desktop_binary="src-tauri/target/${{ matrix.rust_target }}/release/fini-app"
          symbols_file="$RUNNER_TEMP/fini-app-${{ matrix.arch }}-symbols.txt"

          if [ ! -f "$desktop_binary" ]; then
            echo "Expected Linux desktop binary was not produced: $desktop_binary" >&2
            exit 1
          fi

          nm -C "$desktop_binary" > "$symbols_file"
          if ! grep -Eq '(^|[[:space:]])fini_lib::run$' "$symbols_file"; then
            echo "Linux desktop binary is missing the GUI entrypoint fini_lib::run" >&2
            exit 1
          fi

          if grep -Fq 'fini_lib::run_cli' "$symbols_file" || grep -Fq 'fini_lib::services::cli::run' "$symbols_file"; then
            echo "Linux desktop binary contains CLI symbols and may launch the CLI instead of the GUI" >&2
            exit 1
          fi

      - name: Build Linux CLI
        run: cargo build --manifest-path src-tauri/Cargo.toml --locked --release --bin fini --features cli-plane --target ${{ matrix.rust_target }}

      - name: Collect Linux release files
        run: |
          set -euo pipefail
          bundle_root="src-tauri/target/${{ matrix.rust_target }}/release/bundle"
          mkdir -p release/linux
          has_deb="false"
          has_rpm="false"
          has_appimage="false"

          while IFS= read -r file; do
            case "$file" in
              *.deb)
                has_deb="true"
                output_name="fini-${GITHUB_REF_NAME}-linux-${{ matrix.arch }}.deb"
                ;;
              *.rpm)
                has_rpm="true"
                output_name="fini-${GITHUB_REF_NAME}-linux-${{ matrix.arch }}.rpm"
                ;;
              *.AppImage)
                has_appimage="true"
                output_name="fini-${GITHUB_REF_NAME}-linux-${{ matrix.arch }}.AppImage"
                ;;
              *)
                continue
                ;;
            esac

            output_path="release/linux/${output_name}"
            cp "$file" "$output_path"
            if [ -f "${file}.sig" ]; then
              cp "${file}.sig" "${output_path}.sig"
            fi
          done < <(find "$bundle_root" -type f \
            \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \))

          if [ "$has_deb" != "true" ] || [ "$has_rpm" != "true" ] || [ "$has_appimage" != "true" ]; then
            echo "Expected Linux artifacts (.deb, .rpm, .AppImage) were not all produced" >&2
            exit 1
          fi

          cli_binary="src-tauri/target/${{ matrix.rust_target }}/release/fini"
          if [ ! -f "$cli_binary" ]; then
            echo "Expected Linux CLI binary was not produced: $cli_binary" >&2
            exit 1
          fi
          tar -C "$(dirname "$cli_binary")" -czf "release/linux/fini-${GITHUB_REF_NAME}-linux-${{ matrix.arch }}-cli.tar.gz" fini

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ matrix.arch }}
          path: release/linux/*
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Build Windows Artifact (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
          - arch: arm64
            runner: windows-11-arm
            rust_target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    needs: quality-gates
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Sync project version from tag
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          npm version "$version" --no-git-tag-version --allow-same-version
          sed -i -E '/^\[package\]/,/^\[/{s/^version = ".*"/version = "'"$version"'"/}' src-tauri/Cargo.toml
          sed -i -E '/^name = "fini"$/,/^version = /{s/^version = ".*"/version = "'"$version"'"/}' src-tauri/Cargo.lock
          sed -i -E '0,/"version": "[^"]+"/{s//"version": "'"$version"'"/}' src-tauri/tauri.conf.json
          grep -q "\"version\": \"$version\"" package.json
          grep -q "^version = \"$version\"" src-tauri/Cargo.toml
          grep -q "^version = \"$version\"" src-tauri/Cargo.lock
          grep -q "\"version\": \"$version\"" src-tauri/tauri.conf.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          shared-key: release-rust-${{ matrix.rust_target }}

      - name: Install npm dependencies
        run: npm ci

      - name: Build Windows bundles
        env:
          FINI_TAURI_UPDATER_PUBKEY: ${{ secrets.FINI_TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --features ui-plane,desktop-updater,cli-plane --target ${{ matrix.rust_target }} --bundles nsis

      - name: Build Windows CLI
        run: cargo build --manifest-path src-tauri/Cargo.toml --locked --release --bin fini --features cli-plane --target ${{ matrix.rust_target }}

      - name: Collect Windows release files
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $bundleRoot = "src-tauri/target/${{ matrix.rust_target }}/release/bundle"
          New-Item -ItemType Directory -Force release/windows | Out-Null

          $setupFiles = Get-ChildItem -Path $bundleRoot -Recurse -Filter "*-setup.exe"
          if ($setupFiles.Count -eq 0) {
            throw "Expected Windows .exe artifacts were not produced"
          }
          foreach ($file in $setupFiles) {
            $outputPath = "release/windows/fini-${env:GITHUB_REF_NAME}-windows-${{ matrix.arch }}-setup.exe"
            Copy-Item -LiteralPath $file.FullName -Destination $outputPath -Force
            $signaturePath = "$($file.FullName).sig"
            if (Test-Path -LiteralPath $signaturePath) {
              Copy-Item -LiteralPath $signaturePath -Destination "$outputPath.sig" -Force
            }
          }

          $cliBinary = "src-tauri/target/${{ matrix.rust_target }}/release/fini.exe"
          if (!(Test-Path -LiteralPath $cliBinary)) {
            throw "Expected Windows CLI binary was not produced: $cliBinary"
          }
          Compress-Archive -LiteralPath $cliBinary -DestinationPath "release/windows/fini-${env:GITHUB_REF_NAME}-windows-${{ matrix.arch }}-cli.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-${{ matrix.arch }}
          path: release/windows/*
          if-no-files-found: error
          retention-days: 14

  build-android:
    name: Build Android Artifact
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore Android project cache
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/gen/android/.gradle
          key: android-project-${{ runner.os }}-${{ hashFiles('src-tauri/gen/android/gradle.properties', 'src-tauri/gen/android/settings.gradle', 'src-tauri/gen/android/build.gradle.kts', 'src-tauri/gen/android/app/build.gradle.kts', 'src-tauri/gen/android/gradle/wrapper/gradle-wrapper.properties', 'src-tauri/Cargo.lock', 'package-lock.json') }}
          restore-keys: |
            android-project-${{ runner.os }}-

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Sync project version from tag
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          npm version "$version" --no-git-tag-version --allow-same-version
          sed -i -E '/^\[package\]/,/^\[/{s/^version = ".*"/version = "'"$version"'"/}' src-tauri/Cargo.toml
          sed -i -E '/^name = "fini"$/,/^version = /{s/^version = ".*"/version = "'"$version"'"/}' src-tauri/Cargo.lock
          sed -i -E '0,/"version": "[^"]+"/{s//"version": "'"$version"'"/}' src-tauri/tauri.conf.json
          grep -q "\"version\": \"$version\"" package.json
          grep -q "^version = \"$version\"" src-tauri/Cargo.toml
          grep -q "^version = \"$version\"" src-tauri/Cargo.lock
          grep -q "\"version\": \"$version\"" src-tauri/tauri.conf.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: rustup target add aarch64-linux-android

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          shared-key: release-rust

      - name: Install npm dependencies
        run: npm ci

      - name: Build Android APK and AAB (arm64)
        run: npm run tauri android build -- --features ui-plane --ci --apk --aab --target aarch64

      - name: Prepare Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/tmp"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$HOME/tmp/release.keystore"

      - name: Sign Android artifacts
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          unsigned_apk="$(find src-tauri/gen/android/app/build/outputs/apk -name '*-unsigned.apk' | head -n 1)"
          if [ -z "$unsigned_apk" ]; then
            echo "Unsigned APK not found" >&2
            exit 1
          fi
          unsigned_aab="$(find src-tauri/gen/android/app/build/outputs/bundle -name '*.aab' | head -n 1)"
          if [ -z "$unsigned_aab" ]; then
            echo "Unsigned AAB not found" >&2
            exit 1
          fi
          apksigner_path="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort | tail -n 1)"
          if [ -z "$apksigner_path" ]; then
            echo "apksigner not found in Android build-tools" >&2
            exit 1
          fi
          if ! command -v jarsigner >/dev/null 2>&1; then
            echo "jarsigner not found" >&2
            exit 1
          fi
          signed_apk="fini-${GITHUB_REF_NAME}-android.apk"
          "$apksigner_path" sign \
            --ks "$HOME/tmp/release.keystore" \
            --ks-pass "pass:${ANDROID_KEYSTORE_PASSWORD}" \
            --ks-key-alias "${ANDROID_KEY_ALIAS}" \
            --key-pass "pass:${ANDROID_KEY_PASSWORD}" \
            --out "$signed_apk" \
            "$unsigned_apk"
          "$apksigner_path" verify "$signed_apk"

          signed_aab="fini-${GITHUB_REF_NAME}-android.aab"
          jarsigner \
            -keystore "$HOME/tmp/release.keystore" \
            -storepass "${ANDROID_KEYSTORE_PASSWORD}" \
            -keypass "${ANDROID_KEY_PASSWORD}" \
            -signedjar "$signed_aab" \
            "$unsigned_aab" \
            "${ANDROID_KEY_ALIAS}"
          jarsigner -verify "$signed_aab"

      - name: Collect Android native debug symbols
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          import pathlib
          import zipfile

          root = pathlib.Path("src-tauri/target")
          output = pathlib.Path(f"fini-{os.environ['GITHUB_REF_NAME']}-android-native-debug-symbols.zip")
          targets = {
              "aarch64-linux-android": "arm64-v8a",
              "armv7-linux-androideabi": "armeabi-v7a",
              "i686-linux-android": "x86",
              "x86_64-linux-android": "x86_64",
          }

          entries = []
          for rust_target, abi in targets.items():
              library = root / rust_target / "release" / "libfini_lib.so"
              if library.exists():
                  entries.append((library, f"{abi}/libfini_lib.so"))

          if not entries:
              raise SystemExit("Android native debug symbol libraries not found")

          with zipfile.ZipFile(output, "w", compression=zipfile.ZIP_DEFLATED) as archive:
              for library, archive_name in entries:
                  archive.write(library, archive_name)

          print(f"Wrote {output} with {len(entries)} native debug symbol libraries")
          PY

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: |
            fini-${{ github.ref_name }}-android.apk
            fini-${{ github.ref_name }}-android.aab
          if-no-files-found: error
          retention-days: 14

      - name: Upload Android native debug symbols artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-native-debug-symbols
          path: fini-${{ github.ref_name }}-android-native-debug-symbols.zip
          if-no-files-found: error
          retention-days: 14

  build-docker-image:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - quality-gates
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Sync project version from tag
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          npm version "$version" --no-git-tag-version --allow-same-version
          sed -i -E '/^\[package\]/,/^\[/{s/^version = ".*"/version = "'"$version"'"/}' src-tauri/Cargo.toml
          sed -i -E '/^name = "fini"$/,/^version = /{s/^version = ".*"/version = "'"$version"'"/}' src-tauri/Cargo.lock
          sed -i -E '0,/"version": "[^"]+"/{s//"version": "'"$version"'"/}' src-tauri/tauri.conf.json
          grep -q "\"version\": \"$version\"" package.json
          grep -q "^version = \"$version\"" src-tauri/Cargo.toml
          grep -q "^version = \"$version\"" src-tauri/Cargo.lock
          grep -q "\"version\": \"$version\"" src-tauri/tauri.conf.json

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve image name
        id: image
        uses: actions/github-script@v8
        with:
          result-encoding: string
          script: |
            return `ghcr.io/${context.repo.owner.toLowerCase()}/fini`;

      - name: Resolve version labels
        id: image_version
        shell: bash
        run: |
          set -euo pipefail
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.result }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=${{ steps.image_version.outputs.version }}
            type=raw,value=latest,enable=${{ needs.validate-tag.outputs.is_prerelease == 'false' }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=Fini
            org.opencontainers.image.description=A quest-based productivity system for ADHD brains that helps people finish things.
            org.opencontainers.image.version=${{ steps.image_version.outputs.version }}
            org.opencontainers.image.ref.name=${{ github.ref_name }}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=fini-image
          cache-to: type=gha,mode=max,scope=fini-image
          provenance: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Sign Docker image digest
        run: |
          set -euo pipefail
          cosign sign --yes "${{ steps.image.outputs.result }}@${{ steps.docker_build.outputs.digest }}"

      - name: Attest Docker image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.image.outputs.result }}
          subject-digest: ${{ steps.docker_build.outputs.digest }}
          push-to-registry: true

  publish-android-internal:
    name: Publish Android to Play Internal
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - build-android
    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: release-android
          path: release-assets

      - name: Download Android native debug symbols artifact
        uses: actions/download-artifact@v4
        with:
          name: android-native-debug-symbols
          path: release-assets

      - name: Validate Play publishing secret
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "Missing required secret: GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" >&2
            exit 1
          fi

      - name: Validate Android bundle exists
        run: |
          set -euo pipefail
          test -f "release-assets/fini-${GITHUB_REF_NAME}-android.aab"

      - name: Upload Android bundle to Google Play Internal
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.fini.app
          releaseFiles: release-assets/fini-${{ github.ref_name }}-android.aab
          debugSymbols: release-assets/fini-${{ github.ref_name }}-android-native-debug-symbols.zip
          tracks: internal
          releaseName: ${{ github.ref_name }}
          status: completed

  publish-stable:
    name: Publish Stable Release
    if: needs.validate-tag.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    environment: release
    needs:
      - validate-tag
      - build-linux
      - build-windows
      - build-android
      - build-docker-image
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Generate Tauri desktop updater manifest
        run: |
          set -euo pipefail
          node scripts/generate-updater-manifest.mjs \
            --assets-dir release-assets \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${GITHUB_REF_NAME}" \
            --version "${GITHUB_REF_NAME#v}" \
            --notes "See GitHub release notes for ${GITHUB_REF_NAME}." \
            --output release-assets/latest.json

      - name: Create build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "release-assets/*"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Generate detached signatures
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(release-assets/*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found to sign" >&2
            exit 1
          fi
          for file in "${files[@]}"; do
            case "$file" in
              *.sig|*.cosign.sig) continue ;;
            esac
            cosign sign-blob --yes \
              --output-signature "${file}.cosign.sig" \
              "$file"
          done

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --verify-tag \
            --generate-notes

  publish-prerelease:
    name: Publish Prerelease
    if: needs.validate-tag.outputs.is_prerelease == 'true'
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - build-linux
      - build-windows
      - build-android
      - build-docker-image
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Generate Tauri desktop updater manifest
        run: |
          set -euo pipefail
          node scripts/generate-updater-manifest.mjs \
            --assets-dir release-assets \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${GITHUB_REF_NAME}" \
            --version "${GITHUB_REF_NAME#v}" \
            --notes "See GitHub release notes for ${GITHUB_REF_NAME}." \
            --output release-assets/latest.json

      - name: Create build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "release-assets/*"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Generate detached signatures
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(release-assets/*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found to sign" >&2
            exit 1
          fi
          for file in "${files[@]}"; do
            case "$file" in
              *.sig|*.cosign.sig) continue ;;
            esac
            cosign sign-blob --yes \
              --output-signature "${file}.cosign.sig" \
              "$file"
          done

      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --verify-tag \
            --prerelease \
            --generate-notes

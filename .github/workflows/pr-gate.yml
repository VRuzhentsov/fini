name: PR Gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-gate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fe-unit-tests:
    name: fe unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run frontend unit tests
        run: CONTAINER=docker make pr-gate-fe-unit

  be-unit-tests:
    name: be unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run backend unit tests
        run: CONTAINER=docker make pr-gate-be-unit

  e2e-ci:
    name: npm run test:e2e:ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run E2E tests
        run: CONTAINER=docker make pr-gate-e2e

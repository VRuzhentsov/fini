name: Release Button

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: release-button-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_AUTOMATION_TOKEN || github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Plan release
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --tags --force
          latest_tag="$(git describe --tags --abbrev=0 --match 'v[0-9]*' origin/main)"
          main_sha="$(git rev-parse origin/main)"
          subjects="$(git log --format=%s "${latest_tag}..origin/main")"

          if [ -z "$subjects" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            printf '## Release skipped\n\n- Latest tag: %s\n- origin/main: %s\n- Reason: no commits since latest release tag\n' "$latest_tag" "$main_sha" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          bump=patch
          bump_reason="commits exist after latest release tag"
          if printf '%s\n' "$subjects" | grep -Eqi '^[a-z]+(\([^)]+\))?!:'; then
            bump=major
            bump_reason="breaking-change commit subject"
          elif printf '%s\n' "$subjects" | grep -Eqi '^feat(\([^)]+\))?:'; then
            bump=minor
            bump_reason="feature commit subject"
          elif printf '%s\n' "$subjects" | grep -Eqi '^(fix|perf|refactor|build|release)(\([^)]+\))?:'; then
            bump=patch
            bump_reason="patch-level commit subject"
          fi

          IFS=. read -r major minor patch <<< "${latest_tag#v}"
          case "$bump" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          version="$major.$minor.$patch"
          tag="v$version"
          branch="release/$tag"

          { echo "should_release=true"; echo "latest_tag=$latest_tag"; echo "main_sha=$main_sha"; echo "bump=$bump"; echo "bump_reason=$bump_reason"; echo "version=$version"; echo "tag=$tag"; echo "branch=$branch"; } >> "$GITHUB_OUTPUT"
          printf '## Release planned\n\n- Latest tag: %s\n- Next tag: %s\n- Bump: %s\n- Reason: %s\n- origin/main: %s\n\n### Commits\n%s\n' "$latest_tag" "$tag" "$bump" "$bump_reason" "$main_sha" "$(git log --oneline "${latest_tag}..origin/main")" >> "$GITHUB_STEP_SUMMARY"

      - name: Commit version bump
        if: steps.plan.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          test "$(git ls-remote origin refs/heads/main | cut -f1)" = "${{ steps.plan.outputs.main_sha }}"
          test -z "$(git ls-remote --tags origin "refs/tags/${{ steps.plan.outputs.tag }}")"
          test -z "$(git ls-remote --heads origin "refs/heads/${{ steps.plan.outputs.branch }}")"
          cargo run --manifest-path xtask/Cargo.toml -- release-version "${{ steps.plan.outputs.version }}"
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add package.json package-lock.json src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json
          if git diff --cached --quiet; then
            echo "Version metadata already matches ${{ steps.plan.outputs.version }}; reusing current main commit."
          else
            git commit -m "chore: release ${{ steps.plan.outputs.tag }}"
            git push origin "HEAD:refs/heads/main"
          fi
          git push origin "HEAD:refs/heads/${{ steps.plan.outputs.branch }}"

      - name: Import GPG key
        if: steps.plan.outputs.should_release == 'true'
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.RELEASE_TAG_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.RELEASE_TAG_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: false

      - name: Tag and create issue
        if: steps.plan.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.plan.outputs.tag }}"
          git tag -s -a "$tag" -m "$tag"
          git tag -v "$tag"
          git push origin "$tag"
          issue_url="$(gh issue create --title "Release $tag" --body "Release button created $tag from ${{ steps.plan.outputs.latest_tag }}. Triggered by: @${{ github.actor }}. Branch: ${{ steps.plan.outputs.branch }}. Workflow: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID")"
          printf '\n## Release started\n\n- Tag: %s\n- Issue: %s\n- Release workflow: release-tag.yml starts from the tag push\n' "$tag" "$issue_url" >> "$GITHUB_STEP_SUMMARY"

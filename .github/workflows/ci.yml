name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  snyk:
    name: Snyk Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk checks
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=package.json --severity-threshold=high

  fe-unit-tests:
    name: FE Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run frontend unit tests
        run: CONTAINER=docker make pr-gate-fe-unit

  be-unit-tests:
    name: BE Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      CONTAINER: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve backend image cache settings
        shell: bash
        env:
          CAN_PUSH_CACHE: "${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}"
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "FINI_BE_CACHE_IMAGE_PREFIX=ghcr.io/${owner}/fini" >> "$GITHUB_ENV"
          if [ "$CAN_PUSH_CACHE" = "true" ]; then
            echo "FINI_BE_CACHE_PUSH=1" >> "$GITHUB_ENV"
          else
            echo "FINI_BE_CACHE_PUSH=0" >> "$GITHUB_ENV"
          fi

      - name: Login to GHCR
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Run backend unit tests
        run: make pr-gate-be-unit

  be-compile:
    name: BE Compile
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      CONTAINER: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve backend image cache settings
        shell: bash
        env:
          CAN_PUSH_CACHE: "${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}"
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "FINI_BE_CACHE_IMAGE_PREFIX=ghcr.io/${owner}/fini" >> "$GITHUB_ENV"
          if [ "$CAN_PUSH_CACHE" = "true" ]; then
            echo "FINI_BE_CACHE_PUSH=1" >> "$GITHUB_ENV"
          else
            echo "FINI_BE_CACHE_PUSH=0" >> "$GITHUB_ENV"
          fi

      - name: Login to GHCR
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Compile backend tests
        run: make pr-gate-be-compile

  e2e-ci:
    name: E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      CONTAINER: docker
      FINI_E2E_CI_RUN_ID: ci-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve E2E image cache settings
        shell: bash
        env:
          CAN_PUSH_CACHE: "${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}"
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "FINI_E2E_CACHE_IMAGE_PREFIX=ghcr.io/${owner}/fini" >> "$GITHUB_ENV"
          if [ "$CAN_PUSH_CACHE" = "true" ]; then
            echo "FINI_E2E_CACHE_PUSH=1" >> "$GITHUB_ENV"
          else
            echo "FINI_E2E_CACHE_PUSH=0" >> "$GITHUB_ENV"
          fi

      - name: Login to GHCR
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build E2E actor image
        run: make pr-gate-e2e-build-actor

      - name: Build E2E runner image
        run: make pr-gate-e2e-build-runner

      - name: Create E2E network
        run: make pr-gate-e2e-network

      - name: Start E2E actors
        run: make pr-gate-e2e-start-actors

      - name: Wait for E2E actors
        run: make pr-gate-e2e-wait-actors

      - name: Run Playwright E2E suite
        run: make pr-gate-e2e-run

      - name: Print actor logs on failure
        if: failure()
        run: make pr-gate-e2e-logs

      - name: Cleanup E2E containers
        if: always()
        run: make pr-gate-e2e-cleanup

  android-emulator-e2e:
    name: Android Emulator E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add x86_64 Android Rust target
        run: rustup target add x86_64-linux-android

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          shared-key: android-emulator-e2e-rust

      - name: Restore Android project cache
        uses: actions/cache@v4
        with:
          path: src-tauri/gen/android/.gradle
          key: android-emulator-e2e-${{ runner.os }}-${{ hashFiles('src-tauri/gen/android/gradle.properties', 'src-tauri/gen/android/settings.gradle', 'src-tauri/gen/android/build.gradle.kts', 'src-tauri/gen/android/app/build.gradle.kts', 'src-tauri/gen/android/gradle/wrapper/gradle-wrapper.properties', 'src-tauri/Cargo.lock', 'package-lock.json') }}
          restore-keys: |
            android-emulator-e2e-${{ runner.os }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Build x86_64 debug APK
        run: make android-build-emulator-e2e

      - name: Locate debug APK
        shell: bash
        run: |
          set -euo pipefail
          apk=$(find src-tauri/gen/android/app/build/outputs/apk -name '*debug*.apk' | head -n 1)
          if [ -z "$apk" ]; then
            echo "APK not found after build" >&2
            exit 1
          fi
          echo "ANDROID_E2E_APK=$apk" >> "$GITHUB_ENV"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run smoke and notification channel assertions
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          emulator-options: -no-window -no-audio -gpu swiftshader_indirect -no-snapshot -no-metrics
          disable-animations: true
          script: |
            set -eu

            adb install "$ANDROID_E2E_APK"
            adb shell pm grant com.fini.app android.permission.POST_NOTIFICATIONS
            adb shell am start -n com.fini.app/.MainActivity

            echo "Waiting for app process..."
            for i in $(seq 1 30); do
              pid=$(adb shell pidof com.fini.app 2>/dev/null || true)
              if [ -n "$pid" ]; then echo "App process alive: $pid"; break; fi
              if [ "$i" -eq 30 ]; then
                echo "App process did not start" >&2
                adb logcat -d -s AndroidRuntime:E >&2
                exit 1
              fi
              sleep 1
            done

            echo "Waiting for notification channel fini.reminders..."
            for i in $(seq 1 20); do
              if adb shell dumpsys notification 2>/dev/null | grep -q "fini.reminders"; then
                echo "Notification channel fini.reminders confirmed"
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "Notification channel fini.reminders not found" >&2
                adb shell dumpsys notification | grep -A3 "com.fini.app" >&2 || true
                exit 1
              fi
              sleep 1
            done

            echo "Android smoke + notification channel assertions passed"

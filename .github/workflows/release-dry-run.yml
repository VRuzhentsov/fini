name: Release Dry Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-dry-run-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  signing-readiness:
    name: Signing Readiness
    runs-on: ubuntu-latest
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Validate required signing secrets
        env:
          RELEASE_TAG_GPG_PUBLIC_KEY: ${{ secrets.RELEASE_TAG_GPG_PUBLIC_KEY }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          required=(
            RELEASE_TAG_GPG_PUBLIC_KEY
            ANDROID_KEYSTORE_BASE64
            ANDROID_KEYSTORE_PASSWORD
            ANDROID_KEY_ALIAS
            ANDROID_KEY_PASSWORD
          )
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: ${key}" >&2
              exit 1
            fi
          done

      - name: Validate cosign keyless signing
        run: |
          set -euo pipefail
          printf 'release-dry-run' > probe.txt
          cosign sign-blob --yes \
            --output-signature probe.txt.sig \
            --output-certificate probe.txt.pem \
            --bundle probe.txt.bundle \
            probe.txt
          test -s probe.txt.sig
          test -s probe.txt.pem
          test -s probe.txt.bundle

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: signing-readiness
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install npm dependencies
        run: npm ci

      - name: Run backend tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Run backend compile checks
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Run frontend build
        run: npm run build

  build-linux:
    name: Build Linux Artifact
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install npm dependencies
        run: npm ci

      - name: Build Linux bundles
        run: npm run tauri build

      - name: Archive Linux bundle
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          archive_name="fini-dry-run-${short_sha}-linux-bundle.tar.gz"
          tar -czf "$archive_name" -C src-tauri/target/release bundle

      - name: Upload Linux bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: dry-run-linux
          path: fini-dry-run-*-linux-bundle.tar.gz
          if-no-files-found: error
          retention-days: 7

  build-windows:
    name: Build Windows Artifact
    runs-on: windows-latest
    needs: quality-gates
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install npm dependencies
        run: npm ci

      - name: Build Windows bundles
        run: npm run tauri build

      - name: Archive Windows bundle
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $archiveName = "fini-dry-run-$shortSha-windows-bundle.zip"
          Compress-Archive -Path "src-tauri/target/release/bundle/*" -DestinationPath $archiveName -Force

      - name: Upload Windows bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: dry-run-windows
          path: fini-dry-run-*-windows-bundle.zip
          if-no-files-found: error
          retention-days: 7

  build-android:
    name: Build Android Artifact
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install npm dependencies
        run: npm ci

      - name: Build Android bundles
        run: npm run tauri android build

      - name: Prepare Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > /tmp/release.keystore

      - name: Sign Android APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          unsigned_apk="$(find src-tauri/gen/android/app/build/outputs/apk -name '*-unsigned.apk' | head -n 1)"
          if [ -z "$unsigned_apk" ]; then
            echo "Unsigned APK not found" >&2
            exit 1
          fi
          short_sha="${GITHUB_SHA::7}"
          signed_apk="fini-dry-run-${short_sha}-android.apk"
          apksigner sign \
            --ks /tmp/release.keystore \
            --ks-pass "pass:${ANDROID_KEYSTORE_PASSWORD}" \
            --ks-key-alias "${ANDROID_KEY_ALIAS}" \
            --key-pass "pass:${ANDROID_KEY_PASSWORD}" \
            --out "$signed_apk" \
            "$unsigned_apk"
          apksigner verify "$signed_apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: dry-run-android
          path: fini-dry-run-*-android.apk
          if-no-files-found: error
          retention-days: 7

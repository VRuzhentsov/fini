name: Release Prep Check

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      full_matrix:
        description: Run full platform artifact matrix
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-prep-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  signing-readiness:
    name: Signing Readiness
    runs-on: ubuntu-latest
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Validate required signing secrets
        env:
          RELEASE_TAG_GPG_PUBLIC_KEY: ${{ secrets.RELEASE_TAG_GPG_PUBLIC_KEY }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          required=(
            RELEASE_TAG_GPG_PUBLIC_KEY
            ANDROID_KEYSTORE_BASE64
            ANDROID_KEYSTORE_PASSWORD
            ANDROID_KEY_ALIAS
            ANDROID_KEY_PASSWORD
          )
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: ${key}" >&2
              exit 1
            fi
          done

      - name: Validate cosign keyless signing
        run: |
          set -euo pipefail
          printf 'release-prep-check' > probe.txt
          cosign sign-blob --yes \
            --output-signature probe.txt.sig \
            --output-certificate probe.txt.pem \
            --bundle probe.txt.bundle \
            probe.txt
          test -s probe.txt.sig
          test -s probe.txt.pem
          test -s probe.txt.bundle

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: signing-readiness
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            xdg-utils \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          shared-key: release-rust

      - name: Install npm dependencies
        run: npm ci

      - name: Run backend tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Run backend compile checks
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Run frontend build
        run: npm run build

  build-linux:
    name: Build Linux Artifact (${{ matrix.arch }})
    if: github.event_name == 'workflow_dispatch' && inputs.full_matrix == true
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
          - arch: arm64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    needs: quality-gates
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            xdg-utils \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          shared-key: release-rust-${{ matrix.rust_target }}

      - name: Install npm dependencies
        run: npm ci

      - name: Build Linux bundles
        run: npm run tauri build -- --target ${{ matrix.rust_target }} --bundles appimage,deb,rpm

      - name: Collect Linux release files
        run: |
          set -euo pipefail
          bundle_root="src-tauri/target/${{ matrix.rust_target }}/release/bundle"
          mkdir -p prep/linux
          short_sha="${GITHUB_SHA::7}"
          has_deb="false"
          has_rpm="false"
          has_appimage="false"

          while IFS= read -r file; do
            case "$file" in
              *.deb)
                has_deb="true"
                output_name="fini-prep-${short_sha}-linux-${{ matrix.arch }}.deb"
                ;;
              *.rpm)
                has_rpm="true"
                output_name="fini-prep-${short_sha}-linux-${{ matrix.arch }}.rpm"
                ;;
              *.AppImage)
                has_appimage="true"
                output_name="fini-prep-${short_sha}-linux-${{ matrix.arch }}.AppImage"
                ;;
              *)
                continue
                ;;
            esac
            cp "$file" "prep/linux/${output_name}"
          done < <(find "$bundle_root" -type f \
            \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \))

          if [ "$has_deb" != "true" ] || [ "$has_rpm" != "true" ] || [ "$has_appimage" != "true" ]; then
            echo "Expected Linux artifacts (.deb, .rpm, .AppImage) were not all produced" >&2
            exit 1
          fi

      - name: Upload Linux bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: prep-linux-${{ matrix.arch }}
          path: prep/linux/*
          if-no-files-found: error
          retention-days: 7

  build-windows:
    name: Build Windows Artifact (${{ matrix.arch }})
    if: github.event_name == 'workflow_dispatch' && inputs.full_matrix == true
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
          - arch: arm64
            runner: windows-11-arm
            rust_target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    needs: quality-gates
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          shared-key: release-rust-${{ matrix.rust_target }}

      - name: Install npm dependencies
        run: npm ci

      - name: Build Windows bundles
        run: npm run tauri build -- --target ${{ matrix.rust_target }} --bundles nsis

      - name: Collect Windows release files
        shell: bash
        run: |
          set -euo pipefail
          bundle_root="src-tauri/target/${{ matrix.rust_target }}/release/bundle"
          mkdir -p prep/windows
          short_sha="${GITHUB_SHA::7}"

          found_exe="false"
          while IFS= read -r file; do
            output_path="prep/windows/fini-prep-${short_sha}-windows-${{ matrix.arch }}-setup.exe"
            cp "$file" "$output_path"
            found_exe="true"
          done < <(find "$bundle_root" -type f -name '*-setup.exe')

          if [ "$found_exe" != "true" ]; then
            echo "Expected Windows .exe artifacts were not produced" >&2
            exit 1
          fi

      - name: Upload Windows bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: prep-windows-${{ matrix.arch }}
          path: prep/windows/*
          if-no-files-found: error
          retention-days: 7

  build-android:
    name: Build Android Artifact
    if: github.event_name == 'workflow_dispatch' && inputs.full_matrix == true
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore Android project cache
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/gen/android/.gradle
          key: android-project-${{ runner.os }}-${{ hashFiles('src-tauri/gen/android/gradle.properties', 'src-tauri/gen/android/settings.gradle', 'src-tauri/gen/android/build.gradle.kts', 'src-tauri/gen/android/app/build.gradle.kts', 'src-tauri/gen/android/gradle/wrapper/gradle-wrapper.properties', 'src-tauri/Cargo.lock', 'package-lock.json') }}
          restore-keys: |
            android-project-${{ runner.os }}-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: rustup target add aarch64-linux-android

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          shared-key: release-rust

      - name: Install npm dependencies
        run: npm ci

      - name: Build Android APK (arm64)
        run: npm run tauri android build -- --ci --apk --target aarch64

      - name: Prepare Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > /tmp/release.keystore

      - name: Sign Android APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          unsigned_apk="$(find src-tauri/gen/android/app/build/outputs/apk -name '*-unsigned.apk' | head -n 1)"
          if [ -z "$unsigned_apk" ]; then
            echo "Unsigned APK not found" >&2
            exit 1
          fi
          apksigner_path="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort | tail -n 1)"
          if [ -z "$apksigner_path" ]; then
            echo "apksigner not found in Android build-tools" >&2
            exit 1
          fi
          short_sha="${GITHUB_SHA::7}"
          signed_apk="fini-prep-${short_sha}-android.apk"
          "$apksigner_path" sign \
            --ks /tmp/release.keystore \
            --ks-pass "pass:${ANDROID_KEYSTORE_PASSWORD}" \
            --ks-key-alias "${ANDROID_KEY_ALIAS}" \
            --key-pass "pass:${ANDROID_KEY_PASSWORD}" \
            --out "$signed_apk" \
            "$unsigned_apk"
          "$apksigner_path" verify "$signed_apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: prep-android
          path: fini-prep-*-android.apk
          if-no-files-found: error
          retention-days: 7

  build-docker-image:
    name: Build Docker Image Cache
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image name
        id: image
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            return `ghcr.io/${context.repo.owner.toLowerCase()}/fini`;

      - name: Generate docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.result }}
          tags: |
            type=sha,format=long,prefix=prep-

      - name: Build Docker image with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=fini-image
          cache-to: type=gha,mode=max,scope=fini-image

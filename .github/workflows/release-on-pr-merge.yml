name: Release Tag On PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      sha:
        description: Commit SHA on main to tag. Defaults to origin/main.
        required: false
        type: string
      bump:
        description: Semver component to increment.
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: read

concurrency:
  group: release-tag-on-merge
  cancel-in-progress: false

jobs:
  tag-release:
    name: Create Signed Release Tag
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main')
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Setup release committer
        id: committer
        uses: ./.github/actions/setup-release-committer
        with:
          app-id: ${{ vars.FINI_RELEASE_APP_ID }}
          private-key: ${{ secrets.FINI_RELEASE_APP_PRIVATE_KEY }}

      - name: Resolve release target
        id: target
        shell: bash
        env:
          INPUT_SHA: ${{ inputs.sha }}
        run: |
          set -euo pipefail
          git fetch origin main --tags --force

          target_sha="${INPUT_SHA:-}"
          if [ -z "$target_sha" ]; then
            target_sha="$(git rev-parse origin/main)"
          fi

          if ! git merge-base --is-ancestor "$target_sha" origin/main; then
            echo "Target SHA must be on origin/main: $target_sha" >&2
            exit 1
          fi

          echo "sha=$target_sha" >> "$GITHUB_OUTPUT"

      - name: Compute next release tag
        id: version
        shell: bash
        env:
          BUMP: ${{ inputs.bump || 'patch' }}
        run: |
          set -euo pipefail

          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
          fi

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version"

          case "$BUMP" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported bump: $BUMP" >&2
              exit 1
              ;;
          esac

          next_tag="v${major}.${minor}.${patch}"
          if git rev-parse -q --verify "refs/tags/$next_tag" >/dev/null; then
            echo "Tag already exists: $next_tag" >&2
            exit 1
          fi

          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"

      - name: Import release GPG key
        shell: bash
        env:
          RELEASE_TAG_GPG_PRIVATE_KEY: ${{ secrets.RELEASE_TAG_GPG_PRIVATE_KEY }}
          RELEASE_TAG_GPG_PASSPHRASE: ${{ secrets.RELEASE_TAG_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_TAG_GPG_PRIVATE_KEY:-}" ]; then
            echo "Missing required secret: RELEASE_TAG_GPG_PRIVATE_KEY" >&2
            exit 1
          fi
          if [ -z "${RELEASE_TAG_GPG_PASSPHRASE:-}" ]; then
            echo "Missing required secret: RELEASE_TAG_GPG_PASSPHRASE" >&2
            exit 1
          fi

          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"

          printf '%s' "$RELEASE_TAG_GPG_PRIVATE_KEY" | gpg --batch --import
          key_id="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^sec:/ { print $5; exit }')"
          if [ -z "$key_id" ]; then
            echo "No secret signing key found after import" >&2
            exit 1
          fi

          git config --global user.signingkey "$key_id"
          git config --global gpg.program gpg
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          echo "RELEASE_TAG_GPG_KEY_ID=$key_id" >> "$GITHUB_ENV"

      - name: Create and push signed annotated tag
        shell: bash
        env:
          RELEASE_TAG_GPG_PASSPHRASE: ${{ secrets.RELEASE_TAG_GPG_PASSPHRASE }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          gpg_wrapper="$RUNNER_TEMP/gpg-wrapper.sh"
          cat > "$gpg_wrapper" <<'EOF'
          #!/usr/bin/env bash
          exec gpg --batch --yes --pinentry-mode loopback --passphrase "$RELEASE_TAG_GPG_PASSPHRASE" "$@"
          EOF
          chmod 700 "$gpg_wrapper"
          git config --global gpg.program "$gpg_wrapper"

          git tag -s -a "$RELEASE_TAG" -m "$RELEASE_TAG" "$TARGET_SHA"
          git tag -v "$RELEASE_TAG"
          git push origin "refs/tags/$RELEASE_TAG"

      - name: Summary
        shell: bash
        run: |
          set -euo pipefail
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Release Tag Created

          - Previous tag: `${{ steps.version.outputs.latest_tag }}`
          - New tag: `${{ steps.version.outputs.tag }}`
          - Target commit: `${{ steps.target.outputs.sha }}`

          The tag push is the release trigger. Version files remain unchanged on `main`; release builds sync versions from the tag.
          EOF

id: com.fini.app
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: fini

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: fini
    buildsystem: simple
    build-commands:
      - install -Dm755 tauri-app /app/bin/fini
      - install -Dm644 com.fini.app.desktop /app/share/applications/com.fini.app.desktop
      - install -Dm644 icon.png /app/share/icons/hicolor/128x128/apps/com.fini.app.png
    sources:
      - type: file
        path: src-tauri/target/release/tauri-app
        dest-filename: tauri-app
      - type: file
        path: src-tauri/icons/128x128.png
        dest-filename: icon.png
      - type: file
        path: com.fini.app.desktop
